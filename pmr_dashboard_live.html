<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PMR — Shield Mortgage Brokers</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#d8dce8;padding:20px}
.wrap{max-width:1200px;margin:0 auto;border-radius:8px;overflow:hidden;box-shadow:0 8px 48px rgba(0,0,0,.2)}
#app{background:#fafaf8;font-family:'DM Sans',sans-serif;font-size:15px;color:#1a1a1a}
.hdr{background:#1a2744;display:flex;align-items:stretch}
.hl{flex:1;padding:18px 28px;display:flex;flex-direction:column;min-width:0}
.cobrand{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.cobrand img{height:48px;width:auto;display:block;flex-shrink:0}
.bname{font-size:13px;color:rgba(255,255,255,.65)}
.bsep{font-size:11px;color:rgba(255,255,255,.28);margin:0 4px}
.pname{font-size:13px;color:#c9a84c}
.htitle{font-size:24px;color:#fff;font-family:'Playfair Display',serif;font-weight:500;line-height:1.2;margin-bottom:4px}
.hsub{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:12px}
.regnav{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.regnav span{padding:5px 14px;font-size:12px;border:.5px solid rgba(184,150,62,.5);border-radius:20px;color:#c9a84c;cursor:pointer;white-space:nowrap;transition:all .13s}
.regnav span:hover,.regnav span.on{background:rgba(184,150,62,.18);color:#d4a84b;border-color:#c9a84c}
.regnav span.dis{opacity:.35;cursor:not-allowed}
.subnav{display:flex;flex-wrap:wrap;gap:5px}
.subnav span{padding:5px 12px;font-size:12px;border:.5px solid rgba(255,255,255,.2);border-radius:20px;color:rgba(255,255,255,.6);cursor:pointer;white-space:nowrap;transition:all .13s}
.subnav span:hover,.subnav span.on{background:rgba(255,255,255,.14);color:#fff;border-color:rgba(255,255,255,.45)}
.subnav span.dis{opacity:.35;cursor:not-allowed}
.htiles{display:flex;flex-direction:column;border-left:.5px solid rgba(255,255,255,.1);flex-shrink:0;min-width:185px}
.exprow{padding:12px 18px;border-bottom:.5px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center}
.expbtn{background:#b8963e;border:none;color:#fff;padding:8px 20px;border-radius:5px;font-size:12px;cursor:pointer;font-weight:600;font-family:'DM Sans',sans-serif}
.expbtn:hover{background:#c9a84c}
.tile{flex:1;padding:13px 18px;border-bottom:.5px solid rgba(255,255,255,.08);display:flex;flex-direction:column;justify-content:center}
.tile:last-child{border-bottom:none}
.tlbl{font-size:10pt;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.tval{font-size:22px;color:#fff;font-family:'DM Mono',monospace;letter-spacing:-.5px;line-height:1}
.tna{font-size:13px;color:rgba(255,255,255,.24);font-style:italic}
.typebar{display:flex;align-items:center;gap:6px;padding:10px 28px;background:#f4f4f8;border-bottom:.5px solid #dddde8;flex-wrap:wrap}
.barlbl{font-size:10pt;color:#8888a0;text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-right:4px;white-space:nowrap}
.tbtn{padding:5px 13px;font-size:12px;border:.5px solid #dddde8;border-radius:20px;background:#fff;color:#4a4a5a;cursor:pointer;white-space:nowrap;transition:all .13s}
.tbtn:hover{border-color:#1a2744;color:#1a2744}
.tbtn.on{background:#1a2744;color:#fff;border-color:#1a2744}
.tbtn.dis{opacity:.35;cursor:not-allowed}
.csec{padding:20px 28px 16px;background:#fff;border-bottom:.5px solid #dddde8}
.ctitle{font-size:12pt;color:#1a2744;font-weight:600;margin-bottom:4px}
.cmeta{font-size:11pt;color:#8888a0;margin-bottom:10px;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.cli{display:flex;align-items:center;gap:5px;font-size:11px;color:#4a4a5a}
.cl-line{width:18px;height:2.5px;background:#1a2744;border-radius:1px}
.cl-dash{width:18px;height:0;border-top:2px dashed #b8963e}
.cl-area{width:14px;height:11px;background:rgba(26,39,68,.1);border-top:.5px solid rgba(26,39,68,.25)}
.cwrap{position:relative;height:280px;overflow:hidden}
.cwmark{position:absolute;bottom:42px;left:50%;transform:translateX(-50%);pointer-events:none;width:40%}
.cwmark img{width:100%;opacity:0.15;display:block}
.twocol{display:grid;grid-template-columns:7fr 5fr;border-bottom:.5px solid #dddde8}
.narrcol{padding:24px 28px;border-right:.5px solid #dddde8}
.perfcol{padding:24px 22px}
.narrcol h3,.perfcol h3{font-size:11pt;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:#8888a0;margin-bottom:12px;padding-bottom:8px;border-bottom:.5px solid #dddde8}
.narrtext{font-size:14pt;line-height:1.85;color:#1a1a1a;font-family:'Playfair Display',serif}
.perftable{width:100%;border-collapse:collapse}
.perftable th{font-size:10pt;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#8888a0;padding:0 0 8px;text-align:left}
.perftable th:not(:first-child){text-align:right}
.perftable td{padding:8px 0;border-bottom:.5px solid #f0f0f5;color:#1a1a1a;font-size:11pt;vertical-align:top}
.perftable td:not(:first-child){text-align:right;font-family:'DM Mono',monospace;font-size:11pt;color:#1a2744}
.perftable tr:last-child td{border-bottom:none}
.ppos{color:#2d7a4f!important;font-weight:600}
.pneg{color:#b83232!important;font-weight:600}
.pna{color:#aaa!important;font-style:italic;font-family:'DM Sans',sans-serif!important;font-size:11px!important}
.prowcaution{display:block;font-size:10pt;color:#b8963e;margin-top:2px}
.driverssec{padding:20px 28px;border-bottom:.5px solid #dddde8;background:#fafaf8}
.drivershdr{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.drivershdr h3{font-size:11pt;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:#8888a0}
.footer{background:#1a2744;padding:14px 28px;display:flex;justify-content:space-between;align-items:center;gap:16px}
.footertext{font-size:10pt;color:rgba(255,255,255,.32);line-height:1.6}
.footerdate{font-size:10pt;color:rgba(255,255,255,.25);font-family:'DM Mono',monospace}
.suburb-grid-sec{padding:20px 28px;border-bottom:.5px solid #dddde8;background:#fff}
.suburb-grid-sec h3{font-size:11pt;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:#8888a0;margin-bottom:12px;padding-bottom:8px;border-bottom:.5px solid #dddde8}
.suburb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.suburb-card{border:.5px solid #dddde8;border-radius:6px;padding:14px 16px;background:#fff;transition:all .13s}
.suburb-card:hover{border-color:#1a2744;background:#f0f2f7}
.sc-name{font-size:13px;font-weight:600;color:#1a2744;margin-bottom:4px}
.sc-pc{font-size:11px;color:#8888a0;font-weight:400}
.sc-row{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
.sc-med{font-family:'DM Mono',monospace;font-size:13px;color:#1a2744;margin-left:auto}
.sc-wlabel{font-size:10px;color:#8888a0}
.sc-nodata{font-size:11px;color:#aaa;font-style:italic;margin-top:4px}
.vi{animation:fadein .2s ease}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="wrap"><div id="app"><div style="padding:80px;text-align:center;color:#8888a0;font-family:'DM Sans',sans-serif">Loading property market data…</div></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
(function(){
'use strict';

/* ── constants ── */
var BASE = 'https://raw.githubusercontent.com/amirmasinovic/property-market-report/main/data/published/reports';

var REGIONS = [
  {name:'Eastern Suburbs', slug:'eastern-suburbs'},
  {name:'Central Coast',   slug:'central-coast'},
  {name:'Inner West',      slug:'inner-west'}
];

/* JSON type key → display label */
var TYPE_LABELS = {'All':'All','HOUSE':'Houses','UNIT':'Units','VACANT LAND':'Vacant Land','OTHER':'Other'};
var TYPE_ORDER  = ['All','HOUSE','UNIT','VACANT LAND','OTHER'];

/* ── state ── */
var activeTypeKey = 'All';
var curRegion     = null;
var curSuburb     = null;
var charts        = {};
var cache         = {};

/* ── helpers ── */
function fM(v){if(v==null)return null;if(v>=1e6)return '$'+(v/1e6).toFixed(2)+'M';if(v>=1e3)return '$'+Math.round(v/1e3)+'K';return '$'+v;}
function fPct(v){if(v==null)return null;return (v>0?'+':'')+v.toFixed(1)+'%';}
function getApp(){return document.getElementById('app');}

function fetchJSON(url, cb){
  if(cache[url]){cb(null, cache[url]); return;}
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url);
  xhr.onload = function(){
    if(xhr.status >= 200 && xhr.status < 300){
      try{
        var d = JSON.parse(xhr.responseText);
        cache[url] = d;
        cb(null, d);
      } catch(e){ cb(e); }
    } else { cb(new Error('HTTP '+xhr.status)); }
  };
  xhr.onerror = function(){ cb(new Error('Network error')); };
  xhr.send();
}

/* ── chart helpers ── */
function buildChartData(chartObj){
  /* chartObj has: data:[{year,median_price|median_sqm,sales_count}], ytd:{...}|null, primary_field */
  var pf    = (chartObj && chartObj.primary_field) ? chartObj.primary_field : 'median_price';
  var data  = (chartObj && chartObj.data) ? chartObj.data : [];
  var ytd   = (chartObj && chartObj.ytd && chartObj.ytd.year) ? chartObj.ytd : null;

  var labels = data.map(function(r){return String(r.year);});
  var prices = data.map(function(r){return r[pf] != null ? r[pf] : null;});
  var vols   = data.map(function(r){return r.sales_count != null ? r.sales_count : null;});

  var solidPrices, ytdPrices;
  if(!ytd){
    solidPrices = prices.slice();
    ytdPrices   = prices.map(function(){return null;});
  } else {
    labels.push(String(ytd.year));
    prices.push(ytd[pf] != null ? ytd[pf] : null);
    vols.push(ytd.sales_count != null ? ytd.sales_count : null);
    var lastSolid = labels.length - 2;
    solidPrices = prices.map(function(v,i){return i <= lastSolid ? v : null;});
    ytdPrices   = prices.map(function(v,i){return i >= lastSolid ? v : null;});
  }
  return {labels:labels, solidPrices:solidPrices, ytdPrices:ytdPrices, vols:vols, pf:pf};
}

function renderChart(id, chartObj, regPrices, isVac){
  if(charts[id]){charts[id].destroy(); delete charts[id];}
  var cvs = document.getElementById(id);
  if(!cvs) return;

  var cd    = buildChartData(chartObj);
  var yLbl  = isVac ? 'Median $/sqm' : 'Median price';
  var pFmt  = isVac
    ? function(v){return v>=1e3?'$'+Math.round(v/1e3)+'K/sqm':'$'+v+'/sqm';}
    : function(v){return v>=1e6?'$'+(v/1e6).toFixed(1)+'M':v>=1e3?'$'+Math.round(v/1e3)+'K':'$'+v;};

  var ds = [
    {type:'line',label:'Volume',data:cd.vols,fill:true,
     backgroundColor:'rgba(26,39,68,.08)',borderColor:'rgba(26,39,68,.2)',
     borderWidth:.75,pointRadius:0,tension:.4,yAxisID:'yv',order:3},
    {type:'line',label:yLbl,data:cd.solidPrices,fill:false,
     borderColor:'#1a2744',borderWidth:2.5,pointRadius:3,
     pointBackgroundColor:'#1a2744',tension:.35,yAxisID:'yp',order:1},
    {type:'line',label:'YTD',data:cd.ytdPrices,fill:false,
     borderColor:'#1a2744',borderWidth:1.5,borderDash:[5,4],
     pointRadius:3,pointBackgroundColor:'#fff',pointBorderColor:'#1a2744',pointBorderWidth:2,
     tension:.35,yAxisID:'yp',order:0}
  ];
  if(regPrices){
    ds.push({type:'line',label:'Region',data:regPrices,fill:false,
      borderColor:'#b8963e',borderWidth:1.5,borderDash:[5,4],
      pointRadius:0,tension:.35,yAxisID:'yp',order:2});
  }

  charts[id] = new Chart(cvs,{
    data:{labels:cd.labels, datasets:ds},
    options:{
      responsive:true, maintainAspectRatio:false,
      layout:{padding:{top:24}},
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'rgba(26,39,68,.92)',
          titleFont:{size:12}, bodyFont:{family:'monospace',size:11}, padding:12,
          filter:function(i){return i.parsed.y !== null;},
          callbacks:{
            label:function(c){
              if(c.dataset.yAxisID==='yp') return ' '+c.dataset.label+': $'+Math.round(c.parsed.y).toLocaleString()+(isVac?'/sqm':'');
              return ' '+c.dataset.label+': '+Math.round(c.parsed.y).toLocaleString();
            }
          }
        }
      },
      scales:{
        x:{grid:{color:'rgba(0,0,0,.035)'},ticks:{font:{size:10},color:'#aaa',maxTicksLimit:10},border:{color:'rgba(0,0,0,.08)'}},
        yp:{position:'left',grid:{color:'rgba(0,0,0,.035)'},ticks:{font:{size:10},color:'#aaa',callback:pFmt,maxTicksLimit:5},border:{color:'transparent'}},
        yv:{position:'right',min:0,grid:{drawOnChartArea:false},ticks:{font:{size:10},color:'#aaa',maxTicksLimit:4},border:{color:'transparent'}}
      }
    }
  });
}

/* ── HTML builders ── */

function hTile(t){
  var note = '';
  var inner = (t.val != null)
    ? '<div class="tval">'+t.val+'</div>'+note
    : '<div class="tna">Insufficient data</div>';
  return '<div class="tile"><div class="tlbl">'+t.lbl+'</div>'+inner+'</div>';
}

function hHeader(title, sub, date, regSlug, suburbs, curSub, tiles){
  var rBtns = '';
  for(var ri=0;ri<REGIONS.length;ri++){
    var r = REGIONS[ri];
    rBtns += '<span class="'+(r.slug===regSlug?'on':'')+'" data-action="reg" data-slug="'+r.slug+'">'+r.name+'</span>';
  }
  var sBtns = '';
  if(suburbs){
    for(var si=0;si<suburbs.length;si++){
      var s   = suburbs[si];
      var sc  = (s.slug===curSub?'on ':'');
      sBtns  += '<span class="'+sc+'" data-action="sub" data-slug="'+s.slug+'" data-reg="'+regSlug+'">'+s.suburb+'</span>';
    }
  }
  var tHtml = '';
  for(var ti=0;ti<tiles.length;ti++) tHtml += hTile(tiles[ti]);
  return '<div class="hdr">'

function hTypebar(availTypes){
  var h = '<div class="typebar"><span class="barlbl">Property type</span>';
  for(var i=0;i<TYPE_ORDER.length;i++){
    var k   = TYPE_ORDER[i];
    var lbl = TYPE_LABELS[k] || k;
    var on  = availTypes && availTypes.indexOf(k) >= 0;
    if(!on) continue; /* only show available types */
    var cls = 'tbtn'+(activeTypeKey===k?' on':'');
    h += '<span class="'+cls+'" data-action="type" data-typekey="'+k+'">'+lbl+'</span>';
  }
  h += '</div>';
  return h;
}

function hNarr(bullets){
  var inner;
  if(Array.isArray(bullets) && bullets.length){
    inner = '<ul style="list-style:none;padding:0;margin:0">';
    for(var i=0;i<bullets.length;i++){
      if(bullets[i] && bullets[i].trim())
        inner += '<li style="margin-bottom:6px;font-size:14px;line-height:1.7">'+bullets[i].trim()+'</li>';
    }
    inner += '</ul>';
  } else if(typeof bullets === 'string' && bullets){
    inner = bullets;
  } else {
    inner = 'Narrative not available.';
  }
  return '<div class="narrcol"><h3>Narrative</h3><div class="narrtext" style="font-size:14px;line-height:1.7">'+inner+'</div></div>';
}

function hPerf(perf, isVac){
  if(!perf) return '<div class="perfcol"><h3>Price performance</h3><span class="pna" style="display:block;padding-top:4px">No data available.</span></div>';
  var PLBLS = {'3m':'3 months','12m':'12 months','3y':'3 years','5y':'5 years','10y':'10 years','20y':'20 years'};
  var isSqm = perf.is_sqm_basis || isVac;
  var rows  = '';
  var keys  = ['3m','12m','3y','5y','10y','20y'];
  for(var i=0;i<keys.length;i++){
    var k  = keys[i];
    var pr = perf[k] || {};
    var nom = null;
    if(pr.nominal != null){
      var absV = Math.abs(Math.round(pr.nominal));
      var sign = pr.nominal >= 0 ? '+' : '-';
      nom = sign+'$'+absV.toLocaleString()+(isSqm?'/sqm':'');
    }
    var pct  = pr.pct != null ? (pr.pct>0?'+':'')+pr.pct.toFixed(1)+'%' : null;
    var pcls = pr.pct > 0 ? 'ppos' : pr.pct < 0 ? 'pneg' : '';
    rows += '<tr>'
      +'<td>'+PLBLS[k]+'</td>'
      +'<td>'+(nom?nom:'<span class="pna">N/A</span>')+'</td>'
      +'<td class="'+pcls+'">'+(pct?pct:'<span class="pna">N/A</span>')+'</td>'
      +'</tr>';
  }
  var asof = perf.as_of ? '<div style="font-size:11px;color:#aaa;margin-top:10px">As at '+perf.as_of+'</div>' : '';
  return '<div class="perfcol"><h3>Price performance</h3>'
    +'<table class="perftable"><thead><tr><th>Period</th><th>'+(isSqm?'Nominal ($/sqm)':'Nominal ($)')+'</th><th>Growth</th></tr></thead>'
    +'<tbody>'+rows+'</tbody></table>'+asof+'</div>';
}

function hDriversPlaceholder(){
  return '<div class="driverssec"><div class="drivershdr"><h3>Price drivers &amp; market signals</h3></div>'
    +'<div style="font-size:13px;color:#8888a0;font-style:italic;padding:8px 0">Market driver analysis will appear in a future release.</div>'
    +'</div>';
}

function hSuburbGrid(suburbs, regSlug){
  if(!suburbs || !suburbs.length) return '';
  var cards = '';
  for(var i=0;i<suburbs.length;i++){
    var s = suburbs[i];
    var med = s.median_price;
    var medStr = med ? (med>=1e6?'$'+(med/1e6).toFixed(2)+'M':med>=1e3?'$'+Math.round(med/1e3)+'K':'$'+med) : null;
    var trend = s.trend;
    var tArrow = '';
    if(trend && trend.direction){
      var col = trend.direction==='up'?'#2d7a4f':trend.direction==='down'?'#b83232':'#b8963e';
      var arrow = trend.direction==='up'?'&#8593;':trend.direction==='down'?'&#8595;':'&#8594;';
      var pct = trend.pct ? (trend.pct>0?'+':'')+trend.pct.toFixed(1)+'%' : '';
      tArrow = '<span style="font-size:11px;color:'+col+';font-weight:600">'+arrow+' '+pct+'</span>';
    }
    cards += '<div class="suburb-card" data-action="sub" data-slug="'+s.slug+'" data-reg="'+regSlug+'">'
      +'<div class="sc-name">'+s.suburb+' <span class="sc-pc">'+s.postcode+'</span></div>'
      +(medStr
        ? '<div class="sc-row"><span class="sc-wlabel">'+(s.window_label||'Median')+'</span><span class="sc-med">'+medStr+'</span></div>'
        +'<div>'+tArrow+'</div>'
        : '<div class="sc-nodata">Insufficient data</div>')
      +'</div>';
  }
  return '<div class="suburb-grid-sec"><h3>Suburbs</h3><div class="suburb-grid">'+cards+'</div></div>';
}

function hFooter(){
  return '<div class="footer">'
    +'<div class="footertext">NSW Valuer General &middot; Confirmed settlements &middot; Annual aggregation &middot; &ge;100 transactions: published clean &middot; Not financial advice</div>'

    +'</div>';
}

/* ── rendering ── */
function render(html){
  var a = getApp();
  a.innerHTML = html;
  a.className = 'vi';
}

function renderLoading(msg){
  render('<div style="padding:80px;text-align:center;color:#8888a0;font-family:\'DM Sans\',sans-serif">'+(msg||'Loading…')+'</div>');
}

function renderError(msg){
  render('<div style="padding:60px 40px;text-align:center;color:#b83232;font-family:\'DM Sans\',sans-serif;font-size:14px">'
    +'<div style="font-size:20px;margin-bottom:12px">&#9888; Data unavailable</div>'
    +'<div style="color:#8888a0">'+msg+'</div>'
    +'</div>');
}

/* ensure active type key is valid for available types; fall back to 'All' */
function ensureTypeKey(availTypes){
  if(!availTypes || availTypes.length === 0){ activeTypeKey = 'All'; return; }
  if(availTypes.indexOf(activeTypeKey) < 0) activeTypeKey = 'All';
}

/* ── showRegion ── */
function showRegion(slug){
  curRegion = slug;
  curSuburb = null;
  renderLoading('Loading region data…');

  var url = BASE+'/'+slug+'/region.json';
  fetchJSON(url, function(err, rd){
    if(err){ renderError('Could not load region data for '+slug+'. Please check the GitHub data repository.'); return; }

    var availTypes = rd.available_types || ['All'];
    ensureTypeKey(availTypes);
    var typeData = rd.by_type ? rd.by_type[activeTypeKey] : null;
    var isVac    = activeTypeKey === 'VACANT LAND';

    /* tiles */
    var tiles;
    if(typeData && typeData.tiles){
      var t = typeData.tiles;
      tiles = [
        {lbl:t.sales_count ? (t.sales_count.label||'Sales') : 'Sales',
         val:t.sales_count ? (t.sales_count.value != null ? ''+t.sales_count.value : null) : null},
        {lbl:t.median ? (t.median.label||'Median') : 'Median',
         val:t.median ? (t.median.value != null ? fM(t.median.value) : null) : null},
        {lbl:t.avg ? (t.avg.label||'Avg') : 'Avg',
         val:t.avg ? (t.avg.value != null ? fM(t.avg.value) : null) : null}
      ];
    } else {
      tiles = [{lbl:'Sales',val:null},{lbl:'Median',val:null},{lbl:'Avg',val:null}];
    }

    var rName = '';
    for(var ri=0;ri<REGIONS.length;ri++){if(REGIONS[ri].slug===slug){rName=REGIONS[ri].name;break;}}
    var typeLbl = TYPE_LABELS[activeTypeKey] || activeTypeKey;
    var chartObj = typeData ? typeData.chart : null;
    var perf     = typeData ? typeData.price_performance : null;
    var narr     = typeData ? typeData.narrative : null;
    var genDate  = rd.generated_at ? rd.generated_at.substring(0,10) : null;

    var html = hHeader(rName+' Regional Summary',
                rName+', NSW &middot; '+typeLbl,
                genDate, slug, rd.suburbs||[], null, tiles)
      +'<div class="vi">'
      +hTypebar(availTypes)
      +hChart('rc', (isVac?'$/sqm':'Median price')+' and volume &middot; '+rName+' &middot; '+typeLbl+' &middot; Annual', false, isVac)
      +'<div class="twocol">'+hNarr(narr)+hPerf(perf, isVac)+'</div>'
      +hSuburbGrid(rd.suburbs||[], slug)
      +hDriversPlaceholder()
      +'</div>'
      +hFooter();

    render(html);
    renderChart('rc', chartObj, null, isVac);
  });
}

/* ── showSuburb ── */
function showSuburb(regSlug, subSlug){
  curRegion = regSlug;
  curSuburb = subSlug;
  renderLoading('Loading suburb data…');

  var subUrl = BASE+'/'+regSlug+'/'+subSlug+'.json';
  var regUrl = BASE+'/'+regSlug+'/region.json';

  fetchJSON(subUrl, function(serr, sd){
    if(serr){ renderError('Could not load suburb data for '+subSlug+'.'); return; }

    fetchJSON(regUrl, function(rerr, rd){
      /* rd may fail – handle gracefully */
      var suburbs = (rd && rd.suburbs) ? rd.suburbs : [];

      var availTypes = sd.available_types || ['All'];
      ensureTypeKey(availTypes);
      var typeData = sd.by_type ? sd.by_type[activeTypeKey] : null;
      var isVac    = activeTypeKey === 'VACANT LAND';

      /* tiles */
      var tiles;
      if(typeData && typeData.tiles){
        var t = typeData.tiles;
        tiles = [
          {lbl:t.sales_count ? (t.sales_count.label||'Sales') : 'Sales',
           val:t.sales_count ? (t.sales_count.value != null ? ''+t.sales_count.value : null) : null},
          {lbl:t.median ? (t.median.label||'Median') : 'Median',
           val:t.median ? (t.median.value != null ? fM(t.median.value) : null) : null},
          {lbl:t.avg ? (t.avg.label||'Avg') : 'Avg',
           val:t.avg ? (t.avg.value != null ? fM(t.avg.value) : null) : null}
        ];
      } else {
        tiles = [{lbl:'Sales',val:null},{lbl:'Median',val:null},{lbl:'Avg',val:null}];
      }

      var rName    = '';
      for(var ri=0;ri<REGIONS.length;ri++){if(REGIONS[ri].slug===regSlug){rName=REGIONS[ri].name;break;}}
      var typeLbl  = TYPE_LABELS[activeTypeKey] || activeTypeKey;
      var chartObj = typeData ? typeData.chart : null;
      var perf     = typeData ? typeData.price_performance : null;
      var narr     = typeData ? typeData.narrative : null;
      var genDate  = sd.generated_at ? sd.generated_at.substring(0,10) : null;

      /* region prices overlay (All type only, non-vacant) */
      var regPrices = null;
      if(!isVac && rd && rd.by_type && rd.by_type['All'] && rd.by_type['All'].chart){
        var rcd = buildChartData(rd.by_type['All'].chart);
        var scd = buildChartData(chartObj);
        /* align region prices to suburb labels */
        regPrices = scd.labels.map(function(yr){
          var idx = rcd.labels.indexOf(yr);
          return idx >= 0 ? rcd.solidPrices[idx] : null;
        });
      }

      var html = hHeader(sd.suburb+' &mdash; Market Report',
                  rName+', NSW &middot; Postcode '+sd.postcode,
                  genDate, regSlug, suburbs, subSlug, tiles)
        +'<div class="vi">'
        +hTypebar(availTypes)
        +hChart('sc', (isVac?'$/sqm':'Median price')+' and volume &middot; '+sd.suburb+' &middot; '+typeLbl+' &middot; Annual', !isVac && !!regPrices, isVac)
        +'<div class="twocol">'+hNarr(narr)+hPerf(perf, isVac)+'</div>'
        +hDriversPlaceholder()
        +'</div>'
        +hFooter();

      render(html);
      renderChart('sc', chartObj, regPrices, isVac);
    });
  });
}

/* ── event delegation ── */
document.addEventListener('click', function(e){
  var el = e.target;
  while(el && el !== document.body){
    if(el.dataset && el.dataset.action) break;
    el = el.parentElement;
  }
  if(!el || !el.dataset || !el.dataset.action) return;
  var a = el.dataset.action;
  if(a === 'reg'){
    activeTypeKey = 'All';
    showRegion(el.dataset.slug);
  } else if(a === 'sub'){
    activeTypeKey = 'All';
    showSuburb(el.dataset.reg, el.dataset.slug);
  } else if(a === 'type'){
    activeTypeKey = el.dataset.typekey;
    if(curSuburb) showSuburb(curRegion, curSuburb);
    else showRegion(curRegion);
  } else if(a === 'export'){
    alert('PDF export is not yet available in this release.');
  }
});

/* ── boot ── */
showRegion('inner-west');

})();
</script>
